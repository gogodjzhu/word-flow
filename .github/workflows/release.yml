name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive_ext: tar.gz
          - goos: linux
            goarch: arm64
            archive_ext: tar.gz
          - goos: darwin
            goarch: amd64
            archive_ext: tar.gz
          - goos: darwin
            goarch: arm64
            archive_ext: tar.gz
          - goos: windows
            goarch: amd64
            archive_ext: zip
            exe_ext: .exe
          - goos: windows
            goarch: arm64
            archive_ext: zip
            exe_ext: .exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -ldflags "-X github.com/gogodjzhu/word-flow/pkg/cmd/root.version=${{ steps.version.outputs.VERSION }}" -o dist/wordflow${{ matrix.exe_ext }} cmd/wordflow/main.go

      - name: Package
        run: |
          mkdir -p dist/packages
          if [ "${{ matrix.archive_ext }}" = "zip" ]; then
            zip -j "dist/packages/wordflow-${{ matrix.goos }}-${{ matrix.goarch }}.zip" "dist/wordflow${{ matrix.exe_ext }}" README.md README_zh.md LICENSE
          else
            tar -czf "dist/packages/wordflow-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" -C dist "wordflow${{ matrix.exe_ext }}" -C "$GITHUB_WORKSPACE" README.md README_zh.md LICENSE
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wordflow-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/packages/*

  release:
    name: release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p dist/packages
          find dist/artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} dist/packages/ \;

      - name: Generate SHA256 checksums
        run: |
          cd dist/packages
          sha256sum *.tar.gz *.zip > SHA256SUMS
          cat SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/packages/*.tar.gz
            dist/packages/*.zip
            dist/packages/SHA256SUMS
          generate_release_notes: true

      - name: Upload SHA256SUMS as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SHA256SUMS
          path: dist/packages/SHA256SUMS

  publish-npm:
    name: publish-npm
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update package.json version
        working-directory: npm
        run: npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version

      - name: Publish to npm
        working-directory: npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}